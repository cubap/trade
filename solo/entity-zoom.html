<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entity Zoom Lab</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script type="importmap">
        {
            "imports": {
                "three": "/node_modules/three/build/three.module.js"
            }
        }
    </script>
    <style>
        :root {
            color-scheme: dark;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #11171f;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: #d8e3f2;
        }

        #game-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #toolbar {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 50;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(8, 12, 17, 0.82);
            border: 1px solid rgba(151, 176, 214, 0.24);
            border-radius: 10px;
            padding: 8px 10px;
            backdrop-filter: blur(4px);
        }

        #toolbar button,
        #toolbar select {
            background: #203244;
            color: #e4eefb;
            border: 1px solid rgba(151, 176, 214, 0.35);
            border-radius: 7px;
            padding: 5px 8px;
            font-size: 13px;
        }

        #toolbar button:hover,
        #toolbar select:hover {
            background: #2a4460;
            cursor: pointer;
        }

        #inspector {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 290px;
            z-index: 50;
            background: rgba(8, 12, 17, 0.84);
            border: 1px solid rgba(151, 176, 214, 0.24);
            border-radius: 10px;
            padding: 12px;
            backdrop-filter: blur(4px);
        }

        #inspector h2 {
            margin: 0 0 8px;
            font-size: 16px;
            color: #f2f7ff;
        }

        #inspector p {
            margin: 4px 0;
            font-size: 13px;
            color: #c2d1e4;
        }

        #model-label-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 40;
        }

        .entity-label {
            position: absolute;
            transform: translate(-50%, -100%);
            font-size: 12px;
            line-height: 1.2;
            white-space: nowrap;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(193, 214, 245, 0.34);
            background: rgba(11, 18, 28, 0.72);
            color: #d9e7fb;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="toolbar">
        <label for="entity-focus">Focus</label>
        <select id="entity-focus"></select>
        <button id="reset-camera" type="button">Reset Camera</button>
        <button id="toggle-spin" type="button">Spin Camera</button>
        <button id="toggle-follow" type="button">Follow Selected</button>
    </div>

    <aside id="inspector">
        <h2>Entity Zoom Lab</h2>
        <p>Click any model to inspect it.</p>
        <p id="selected-name">Selected: none</p>
        <p id="selected-type">Type: -</p>
        <p id="selected-subtype">Subtype: -</p>
        <p id="selected-tags">Tags: -</p>
        <p id="hint">Tip: open with ?renderer=three for the full 3D pass.</p>
    </aside>

    <div id="model-label-layer"></div>

    <script type="module" src="js/entityZoomLab.js"></script>
</body>
</html>
