<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blur-Based Terrain Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            max-height: 90vh;
            overflow-y: auto;
        }
        #controls h3 { margin-bottom: 10px; color: #87CEEB; }
        #controls h4 { margin: 10px 0 5px; color: #aaa; font-size: 11px; }
        #controls label {
            display: block;
            margin: 5px 0;
        }
        #controls input[type="range"] {
            width: 150px;
            margin-left: 10px;
        }
        #info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h3>Global Height Terrain</h3>

        <h4>🌍 Global Height Map</h4>
        <label title="Very low-frequency FBM scale">
            Global Scale: <input type="range" id="globalScale" min="500" max="2000" step="50" value="1000">
            <span id="globalScaleVal">1000</span>m
        </label>
        <label title="Peak of the global height map">
            Max Height: <input type="range" id="globalMaxHeight" min="100" max="300" value="200">
            <span id="globalMaxHeightVal">200</span>m
        </label>
        <label title="Lowest point (no below-sea-level)">
            Min Height: <input type="range" id="globalMinHeight" min="-30" max="0" value="0">
            <span id="globalMinHeightVal">0</span>m
        </label>

        <h4>⛰️ Detail Noise</h4>
        <label title="Medium scale for hills and ridges">
            Detail Scale: <input type="range" id="detailScale" min="50" max="300" value="185">
            <span id="detailScaleVal">185</span>m
        </label>
        <label>
            Ridge Sharpness: <input type="range" id="ridgeSharpness" min="1" max="5" step="0.5" value="2.5">
            <span id="ridgeSharpnessVal">2.5</span>
        </label>
        <label>
            Ridge Strength: <input type="range" id="ridgeStrength" min="0" max="1" step="0.1" value="0.9">
            <span id="ridgeStrengthVal">0.9</span>
        </label>

        <h4>📊 Amplitude Scaling</h4>
        <label title="Linear scaling (0.5-1.5)">
            Exponent: <input type="range" id="amplitudeExponent" min="0.3" max="1.5" step="0.1" value="1">
            <span id="amplitudeExponentVal">1</span>
        </label>
        <label title="Max variation at peak global height">
            Max Amplitude: <input type="range" id="maxDetailAmplitude" min="50" max="200" value="150">
            <span id="maxDetailAmplitudeVal">150</span>m
        </label>
        <label title="Minimum variation at lowest points">
            Min Amplitude: <input type="range" id="minDetailAmplitude" min="0" max="10" value="2">
            <span id="minDetailAmplitudeVal">2</span>m
        </label>

        <h4>🌊 Water & Rivers</h4>
        <label>
            Water Level: <input type="range" id="waterLevel" min="0.05" max="0.3" step="0.01" value="0.07">
            <span id="waterLevelVal">0.07</span>
        </label>
        <label>
            River Carving: <input type="range" id="riverCarvingDepth" min="0" max="50" value="15">
            <span id="riverCarvingDepthVal">15</span>m
        </label>
        <label>
            Global Grade: <input type="range" id="globalGrade" min="0" max="0.3" step="0.01" value="0.08">
            <span id="globalGradeVal">0.08</span>
        </label>

        <h4>🎲 Seed</h4>
        <label>
            Seed: <input type="range" id="seed" min="1" max="1000" value="42">
            <span id="seedVal">42</span>
        </label>

        <button onclick="regenerate()">Regenerate</button>
    </div>
    <div id="info">
        Drag to rotate | Scroll to zoom | Right-click to pan
        <span id="riverDebug"></span>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "/node_modules/three/build/three.module.js",
            "three/addons/": "/node_modules/three/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three'
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js'

        // Import the actual TerrainGenerator (with cache busting)
        import createTerrainGenerator from '/solo/js/core/TerrainGenerator.js?v=2026061807'

        // Three.js setup
        const scene = new THREE.Scene()
        scene.background = new THREE.Color(0x87CEEB)

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000)
        camera.position.set(1000, 500, 1000)

        const renderer = new THREE.WebGLRenderer({ antialias: true })
        renderer.setSize(window.innerWidth, window.innerHeight)
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2))
        document.body.appendChild(renderer.domElement)

        const controls = new OrbitControls(camera, renderer.domElement)
        controls.enableDamping = true
        controls.dampingFactor = 0.05
        controls.target.set(1000, 50, 1000)

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.6)
        scene.add(ambient)

        const sun = new THREE.DirectionalLight(0xffffff, 1.5)
        sun.position.set(500, 800, 300)
        scene.add(sun)

        const hemisphere = new THREE.HemisphereLight(0x87CEEB, 0x355f2f, 0.4)
        scene.add(hemisphere)

        // Terrain
        let terrainMesh = null
        let currentGenerator = null

        function buildTerrain() {
            const options = {
                seed: parseInt(document.getElementById('seed').value),
                worldWidth: 2000,
                worldHeight: 2000,
                maxElevation: 400,
                waterLevel: parseFloat(document.getElementById('waterLevel').value),
                globalScale: parseInt(document.getElementById('globalScale').value),
                globalMaxHeight: parseInt(document.getElementById('globalMaxHeight').value),
                globalMinHeight: parseInt(document.getElementById('globalMinHeight').value),
                detailScale: parseInt(document.getElementById('detailScale').value),
                ridgeStrength: parseFloat(document.getElementById('ridgeStrength').value),
                ridgeSharpness: parseFloat(document.getElementById('ridgeSharpness').value),
                amplitudeExponent: parseFloat(document.getElementById('amplitudeExponent').value),
                maxDetailAmplitude: parseInt(document.getElementById('maxDetailAmplitude').value),
                minDetailAmplitude: parseInt(document.getElementById('minDetailAmplitude').value),
                riverCarvingDepth: parseFloat(document.getElementById('riverCarvingDepth').value),
                globalGrade: parseFloat(document.getElementById('globalGrade').value)
            }

            currentGenerator = createTerrainGenerator(options)

            if (terrainMesh) {
                terrainMesh.geometry.dispose()
                terrainMesh.material.dispose()
                scene.remove(terrainMesh)
            }

            const segments = 300
            const size = 2000
            const geometry = new THREE.PlaneGeometry(size, size, segments, segments)
            geometry.rotateX(-Math.PI / 2)

            const positions = geometry.attributes.position.array
            const colors = new Float32Array(positions.length)

            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i]
                const z = positions[i + 2]
                const wx = x + 1000
                const wy = z + 1000
                const height = currentGenerator.getElevation(wx, wy)
                positions[i + 1] = height

                const terrainType = currentGenerator.getTerrainType(wx, wy)
                const color = new THREE.Color()

                switch (terrainType) {
                    case 'deep_water':
                        color.set('#1A4A5E')
                        break
                    case 'shallow_water':
                        color.set('#2E738A')
                        break
                    case 'beach':
                        color.set('#C2B280')
                        break
                    case 'plains':
                        color.set('#5A7A3E')
                        break
                    case 'forest':
                        color.set('#3A5F0B')
                        break
                    case 'foothills':
                        color.set('#4A6B2E')
                        break
                    case 'hills':
                        color.set('#5A7A3E')
                        break
                    case 'mountains':
                        color.set('#6B6B5E')
                        break
                    case 'peak':
                        color.set('#8B8B7E')
                        if (height > options.maxElevation * 0.8) {
                            color.lerp(new THREE.Color('#E8E8E8'), (height / options.maxElevation - 0.8) / 0.2)
                        }
                        break
                }

                colors[i] = color.r
                colors[i + 1] = color.g
                colors[i + 2] = color.b
            }

            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3))
            geometry.computeVertexNormals()

            terrainMesh = new THREE.Mesh(
                geometry,
                new THREE.MeshStandardMaterial({
                    color: '#355f2f',
                    roughness: 0.9,
                    metalness: 0,
                    vertexColors: true,
                    flatShading: false
                })
            )
            scene.add(terrainMesh)
        }

        // Water plane
        let waterMesh = null

        function buildWater() {
            if (waterMesh) {
                waterMesh.geometry.dispose()
                waterMesh.material.dispose()
                scene.remove(waterMesh)
            }

            const waterLevel = parseFloat(document.getElementById('waterLevel').value)
            const waterHeight = waterLevel * 400 // maxElevation is fixed at 400

            const geometry = new THREE.PlaneGeometry(2000, 2000)
            geometry.rotateX(-Math.PI / 2)
            const material = new THREE.MeshStandardMaterial({
                color: 0x2E738A,
                transparent: true,
                opacity: 0.7,
                roughness: 0.1,
                metalness: 0.3
            })

            waterMesh = new THREE.Mesh(geometry, material)
            waterMesh.position.y = waterHeight
            scene.add(waterMesh)
        }

        // River ribbons — variable width based on tributary count
        let riverMesh = null

        function buildRivers() {
            if (riverMesh) {
                riverMesh.geometry.dispose()
                riverMesh.material.dispose()
                scene.remove(riverMesh)
            }

            if (!currentGenerator || currentGenerator.rivers.length === 0) {
                const debug = document.getElementById('riverDebug')
                if (debug) debug.textContent = ' | No rivers generated'
                return
            }

            // Debug: show river count and tributary info
            const debug = document.getElementById('riverDebug')
            if (debug) {
                const totalTributaries = currentGenerator.rivers.reduce((sum, r) => {
                    const maxT = Math.max(...r.map(p => p.tributaries || 1))
                    return sum + `River(${r.length}pts, maxT=${maxT})`
                }, '')
                debug.textContent = ` | Rivers: ${currentGenerator.rivers.length} — ${totalTributaries}`
            }

            const positions = []
            const colors = []
            const indices = []
            let vertIndex = 0

            for (const river of currentGenerator.rivers) {
                for (let i = 0; i < river.length; i++) {
                    const pt = river[i]
                    const next = river[Math.min(i + 1, river.length - 1)]

                    // Convert world coords to mesh coords
                    const cx = pt.x - 1000
                    const cz = pt.y - 1000
                    const cy = pt.elev + 0.3

                    // Width scales with tributary count
                    const tributaries = pt.tributaries || 1
                    const halfWidth = 1 + tributaries * 1.5

                    // Direction perpendicular to river flow
                    const dx = (next.x - pt.x)
                    const dz = (next.y - pt.y)
                    const len = Math.sqrt(dx * dx + dz * dz) || 1
                    const nx = -dz / len * halfWidth
                    const nz = dx / len * halfWidth

                    // Left and right vertices of the ribbon
                    positions.push(cx - nx, cy, cz - nz)
                    positions.push(cx + nx, cy, cz + nz)

                    // Color: bright magenta so rivers are visible against terrain
                    for (let v = 0; v < 2; v++) {
                        colors.push(1, 0.1, 0.7)
                    }

                    // Create quad triangles (except last segment)
                    if (i < river.length - 1) {
                        indices.push(vertIndex, vertIndex + 1, vertIndex + 2)
                        indices.push(vertIndex + 1, vertIndex + 3, vertIndex + 2)
                    }
                    vertIndex += 2
                }
            }

            const geometry = new THREE.BufferGeometry()
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3))
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3))
            geometry.setIndex(indices)
            geometry.computeVertexNormals()

            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.2,
                metalness: 0.1,
                transparent: true,
                opacity: 0.85,
                side: THREE.DoubleSide
            })

            riverMesh = new THREE.Mesh(geometry, material)
            scene.add(riverMesh)
        }

        // Initial build
        buildTerrain()
        buildWater()
        buildRivers()

        // Controls
        window.regenerate = function() {
            buildTerrain()
            buildWater()
            buildRivers()
        }

        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                const valSpan = document.getElementById(input.id + 'Val')
                if (valSpan) valSpan.textContent = input.value
            })
        })

        // Animation
        function animate() {
            requestAnimationFrame(animate)
            controls.update()
            renderer.render(scene, camera)
        }
        animate()

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight
            camera.updateProjectionMatrix()
            renderer.setSize(window.innerWidth, window.innerHeight)
        })
    </script>
</body>
</html>
